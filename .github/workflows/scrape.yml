name: Monthly CDE Population Scrape

on:
  schedule:
    # Run at 11 PM ET on the 15th of every month (03:00 UTC on 16th)
    - cron: '0 3 16 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run population scraper
        run: python scraper.py --concurrency 15

      - name: Show results
        run: wc -l cde_populations.csv && head -5 cde_populations.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cde_populations.csv
          git diff --cached --quiet || git commit -m "Update CDE populations $(date -u +%Y-%m-%d)"
          git push
